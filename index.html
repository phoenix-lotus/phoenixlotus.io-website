<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ff5e3a" />

    <title>Robert Goldberg — Founder, PhoenixLotus Web Studio</title>
    <meta
      name="description"
      content="PhoenixLotus Web Studio — Robert (Bobby) Goldberg designs and builds human-first, AI-native websites and web apps, for clients and his own products. React / MERN developer in Mendocino County, CA."
    />
    <link rel="canonical" href="https://phoenixlotus.netlify.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PhoenixLotus" />
    <meta property="og:title" content="Robert Goldberg — Founder, PhoenixLotus Web Studio" />
    <meta
      property="og:description"
      content="I design and build human-first, AI-native websites and web apps — for clients and my own products. PhoenixLotus Web Studio · Mendocino County, CA."
    />
    <meta property="og:url" content="https://phoenixlotus.netlify.app/" />
    <meta property="og:image" content="https://phoenixlotus.netlify.app/og/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600..900;1,9..144,600..700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Person JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Robert Goldberg",
        "alternateName": "Bobby Goldberg",
        "jobTitle": "Founder & Web Developer",
        "worksFor": { "@type": "Organization", "name": "PhoenixLotus Web Studio" },
        "url": "https://phoenixlotus.netlify.app/",
        "address": { "@type": "PostalAddress", "addressLocality": "Mendocino County", "addressRegion": "CA" },
        "email": "robert.goldberg.dev@gmail.com",
        "sameAs": [
          "https://github.com/phoenix-lotus",
          "https://www.linkedin.com/in/robert-g-838955193"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Hidden static form so Netlify's build-time bot detects it (the real form is React-rendered). -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
